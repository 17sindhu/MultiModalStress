services:
  - type: web
    name: multimodalstress
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: OUTPUT_BASE_DIR
        value: /data/Output
      - key: DATABASE_URL
        value: sqlite:////data/samjna.db
    disk:
      name: samjna-data
      mountPath: /data
      sizeGB: 1
