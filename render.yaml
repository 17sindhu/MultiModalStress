services:
  - type: web
    name: multimodalstress
    runtime: python
    plan: free

    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app

    envVars:
      - key: SECRET_KEY
        generateValue: true

      - key: OUTPUT_BASE_DIR
        value: Output

      - key: DATABASE_URL
        value: sqlite:///samjna.db