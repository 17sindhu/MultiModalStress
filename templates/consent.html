{% extends "base.html" %}
{% block title %}Consent – Samjna{% endblock %}

{% block content %}
<h1 class="page-title">SAMJNA</h1>
<p class="page-subtitle">Multimodal Stress Assessment</p>

<form method="POST" id="consent-form">

  <!-- Language selector -->
  <div class="card">
    <div class="card-title">Select Language / மொழி தேர்வு / ಭಾಷೆ ಆಯ್ಕೆ</div>
    <div class="radio-group">
      <label class="radio-btn">
        <input type="radio" name="language" value="english"
               {% if lang == 'english' %}checked{% endif %}
               onchange="updateLang(this.value)">
        <span>English</span>
      </label>
      <label class="radio-btn">
        <input type="radio" name="language" value="tamil"
               {% if lang == 'tamil' %}checked{% endif %}
               onchange="updateLang(this.value)">
        <span>தமிழ்</span>
      </label>
      <label class="radio-btn">
        <input type="radio" name="language" value="kannada"
               {% if lang == 'kannada' %}checked{% endif %}
               onchange="updateLang(this.value)">
        <span>ಕನ್ನಡ</span>
      </label>
    </div>
  </div>

  <!-- Name entry -->
  <div class="card">
    <div class="card-title" id="lbl-name">{{ labels.name_prompt }}</div>
    <div class="form-group" style="margin-bottom:0">
      <input type="text" name="participant_name" id="name-input"
             placeholder="Enter your full name"
             autocomplete="off" required
             oninput="checkReady()">
    </div>
  </div>

  <!-- Consent -->
  <div class="card">
    <div class="card-title" id="lbl-consent-title">{{ labels.consent_title }}</div>
    <div class="consent-text" id="consent-text">{{ consent_text }}</div>
    <label class="check-label">
      <input type="checkbox" name="consent_check" id="consent-check"
             onchange="checkReady()">
      <span id="lbl-consent-check">{{ labels.consent_check }}</span>
    </label>
  </div>

  <div class="btn-row">
    <button type="submit" id="proceed-btn" class="btn btn-primary"
            disabled>{{ labels.proceed }}</button>
  </div>
</form>
{% endblock %}

{% block scripts %}
<script>
const LABELS = {{ {
  'english': {
    'name_prompt': 'Please enter your full name:',
    'consent_title': 'Informed Consent',
    'consent_check': 'I have read and I accept the consent statement above',
    'proceed': 'Proceed →'
  },
  'tamil': {
    'name_prompt': 'உங்கள் முழு பெயரை உள்ளிடவும்:',
    'consent_title': 'தகவல் அறிவிக்கப்பட்ட சம்மதம்',
    'consent_check': 'மேலே உள்ள சம்மத அறிக்கையை படித்து ஏற்றுக்கொள்கிறேன்',
    'proceed': 'தொடர்க →'
  },
  'kannada': {
    'name_prompt': 'ದಯವಿಟ್ಟು ನಿಮ್ಮ ಪೂರ್ತಿ ಹೆಸರು ನಮೂದಿಸಿ:',
    'consent_title': 'ಮಾಹಿತಿಯುಕ್ತ ಒಪ್ಪಿಗೆ',
    'consent_check': 'ಮೇಲಿನ ಒಪ್ಪಿಗೆ ಹೇಳಿಕೆಯನ್ನು ಓದಿ ಸ್ವೀಕರಿಸುತ್ತೇನೆ',
    'proceed': 'ಮುಂದುವರಿಸು →'
  }
} | tojson }};

const CONSENT = {{ {
  'english': consent_text,
  'tamil':   '',
  'kannada': ''
} | tojson }};

// We'll fetch translated consent via reload for simplicity
function updateLang(lang) {
  window.location.href = '/consent?lang=' + lang;
}

function checkReady() {
  const name = document.getElementById('name-input').value.trim();
  const checked = document.getElementById('consent-check').checked;
  document.getElementById('proceed-btn').disabled = !(name && checked);
}

// Run on load
checkReady();
</script>
{% endblock %}
